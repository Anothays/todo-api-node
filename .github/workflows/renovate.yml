name: Renovate
on:
  schedule:
    - cron: "0 0 * * 1" # Every Monday at 00:00
  workflow_dispatch:
jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: action/checkout@v6
      - name: Run Renovate
        uses: renovatebot/github-action@v43.31.1
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
