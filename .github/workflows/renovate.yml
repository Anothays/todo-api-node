name: Renovate
on:
  schedule:
    - cron: "0 0 * * *" # Every Monday at 00:00
  workflow_dispatch:
jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.2
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
