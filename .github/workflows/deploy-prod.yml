name: PRODUCTION DEPLOYMENT

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: production
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PROD }}
      SVC_ID: ${{ secrets.SVC_ID_PROD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Deploy to Railway
        run: railway redeploy --yes --service=${{ env.SVC_ID }}

  post-deploy:
    needs: [deploy-prod]
    if: always() && (needs.deploy-prod.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Post-deploy health check
        uses: ./.github/actions/post-deploy
        with:
          prod_result: ${{ needs.deploy-prod.result }}
          staging_result: ${{ needs.deploy-prod.result }}
          url_prod: ${{ secrets.RAILWAY_BASE_URL_PROD }}
          url_staging: ${{ secrets.RAILWAY_BASE_URL_STAGING }}

  notify-with-discord-webhook:
    needs: [deploy-prod]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Notify Discord
        uses: ./.github/actions/discord
        with:
          result: ${{ needs.deploy-prod.result }}
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
