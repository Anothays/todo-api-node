name: PRODUCTION DEPLOYMENT

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    uses: ./.github/workflows/quality.yml
    secrets: inherit

  publish-image:
    if: github.ref == 'refs/heads/main'
    environment: production
    runs-on: ubuntu-latest
    needs: [quality]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-prod:
    runs-on: ubuntu-latest
    environment: production
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PROD }}
      SVC_ID: ${{ secrets.SVC_ID_PROD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Deploy to Railway
        run: railway redeploy --yes --service=${{ env.SVC_ID }}

  post-deploy:
    needs: [deploy-prod]
    if: always() && (needs.deploy-prod.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Post-deploy health check
        uses: ./.github/actions/post-deploy
        with:
          prod_result: ${{ needs.deploy-prod.result }}
          staging_result: ${{ needs.deploy-prod.result }}
          url_prod: ${{ secrets.RAILWAY_BASE_URL_PROD }}
          url_staging: ${{ secrets.RAILWAY_BASE_URL_STAGING }}

  notify-with-discord-webhook:
    needs: [deploy-prod]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Notify Discord
        uses: ./.github/actions/discord
        with:
          result: ${{ needs.deploy-prod.result }}
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
