name: Todo pipeline

on:
  push:
    branches: [main, develop]
  # pull_request:
  #   branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup project
        uses: ./.github/actions/setup-project
      - name: Lint
        run: npx eslint .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup project
        uses: ./.github/actions/setup-project
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - name: Test
        run: npm run test -- --coverage
        env:
          SECRET_KEY: TESTING_SECRET_KEY
          API_KEY: TestingApiKey
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.node-version }}
          path: coverage/
          retention-days: 5
      - name: Send coverage to SonarCloud
        uses: SonarSource/sonarqube-scan-action@v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  swagger-validate:
    runs-on: ubuntu-latest
    name: Swagger Editor Validator (local)
    needs: [lint]
    services:
      swagger-editor:
        image: swaggerapi/swagger-editor
        ports:
          - 80:8080
    steps:
      - uses: actions/checkout@v6
      - name: Setup project
        uses: ./.github/actions/setup-project
      - name: Generate OpenAPI spec
        run: |
          node --input-type=module -e "const m = await import('./config/swagger.js'); 
          const fs = await import('fs'); 
          fs.writeFileSync('openapi.json', JSON.stringify(m.spec, null, 2));"
      - name: Validate OpenAPI definition
        uses: swaggerexpert/swagger-editor-validate@v1
        with:
          swagger-editor-url: http://localhost/
          definition-file: openapi.json
          default-timeout: 20000

  # Quality gate: SonarSource/sonarcloud + sonar.projectKey in sonar-project.properties
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup project
        uses: ./.github/actions/setup-project
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup project
        uses: ./.github/actions/setup-project
      - name: Build Docker image
        run: docker build -t todo-app:latest .
      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.34.1
        with:
          image-ref: "todo-app:latest"
          format: "table"
          exit-code: 1
          ignore-unfixed: true
          severity: "CRITICAL"

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PROD }}
      SVC_ID: ${{ secrets.SVC_ID_PROD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Deploy to Railway
        run: railway up --ci --service=${{ env.SVC_ID }}

  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging
    container: ghcr.io/railwayapp/cli:latest
    needs: [publish-image]
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
      SVC_ID: ${{ secrets.SVC_ID_STAGING }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Deploy to Railway
        run: railway up --ci --service=${{ env.SVC_ID }}

  post-deploy:
    needs: [deploy-prod, deploy-staging]
    if: always() && (needs.deploy-prod.result == 'success' || needs.deploy-staging.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Check /health (prod)
        if: needs.deploy-prod.result == 'success'
        run: curl -f -s "${{ secrets.RAILWAY_BASE_URL_PROD }}/health"
      - name: Check /health (staging)
        if: needs.deploy-staging.result == 'success'
        run: curl -f -s "${{ secrets.RAILWAY_BASE_URL_STAGING }}/health"

  notify-with-discord-webhook:
    needs: [deploy-prod, deploy-staging]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Prepare Discord message
        id: msg
        run: |
          PROD="${{ needs.deploy-prod.result }}"
          STAGING="${{ needs.deploy-staging.result }}"
          PROD_LABEL=$(echo "$PROD" | sed 's/success/✅ Réussi/; s/failure/❌ Échec/; s/skipped/⏭️ Ignoré/')
          STAGING_LABEL=$(echo "$STAGING" | sed 's/success/✅ Réussi/; s/failure/❌ Échec/; s/skipped/⏭️ Ignoré/')
          echo "description=**Prod:** $PROD_LABEL | **Staging:** $STAGING_LABEL" >> $GITHUB_OUTPUT
          if [ "$PROD" = "failure" ] || [ "$STAGING" = "failure" ]; then
            echo "title=Deploy - Échec" >> $GITHUB_OUTPUT
            echo "color=16711680" >> $GITHUB_OUTPUT
          else
            echo "title=Deploy - Succès" >> $GITHUB_OUTPUT
            echo "color=65280" >> $GITHUB_OUTPUT
          fi
      - name: Notify Discord
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          # content: ""
          title: ${{ steps.msg.outputs.title }}
          description: ${{ steps.msg.outputs.description }}
          # image: ${{ secrets.EMBED_IMAGE }}
          color: ${{ steps.msg.outputs.color }}
          url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          username: GitHub Actions
          # avatar_url: ${{ secrets.AVATAR_URL }}

  publish-image:
    if: github.ref == 'refs/heads/main'
    environment: production
    runs-on: ubuntu-latest
    needs: [lint, test, quality-gate, security-scan, swagger-validate]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
