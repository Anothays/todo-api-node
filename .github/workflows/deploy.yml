name: Todo pipeline

on:
  push:
    branches: [main, develop]
  # pull_request:
  #   branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/reusable-setup.yml
    secrets: inherit

  publish-image:
    if: github.ref == 'refs/heads/develop'
    environment: staging
    runs-on: ubuntu-latest
    needs: [ci]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging
    container: ghcr.io/railwayapp/cli:latest
    needs: [publish-image]
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
      SVC_ID: ${{ secrets.SVC_ID_STAGING }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Deploy to Railway
        run: railway redeploy --yes --service=${{ env.SVC_ID }}

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    container: ghcr.io/railwayapp/cli:latest
    needs: [ci]
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PROD }}
      SVC_ID: ${{ secrets.SVC_ID_PROD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Deploy to Railway
        run: railway redeploy --yes --service=${{ env.SVC_ID }}

  post-deploy:
    needs: [deploy-prod, deploy-staging]
    if: always() && (needs.deploy-prod.result == 'success' || needs.deploy-staging.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Check /health (prod)
        if: needs.deploy-prod.result == 'success'
        run: curl -f -s "${{ secrets.RAILWAY_BASE_URL_PROD }}/health"
      - name: Check /health (staging)
        if: needs.deploy-staging.result == 'success'
        run: curl -f -s "${{ secrets.RAILWAY_BASE_URL_STAGING }}/health"

  notify-with-discord-webhook:
    needs: [deploy-prod, deploy-staging]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Prepare Discord message
        id: msg
        run: |
          PROD="${{ needs.deploy-prod.result }}"
          STAGING="${{ needs.deploy-staging.result }}"
          PROD_LABEL=$(echo "$PROD" | sed 's/success/✅ Réussi/; s/failure/❌ Échec/; s/skipped/⏭️ Ignoré/')
          STAGING_LABEL=$(echo "$STAGING" | sed 's/success/✅ Réussi/; s/failure/❌ Échec/; s/skipped/⏭️ Ignoré/')
          echo "description=**Prod:** $PROD_LABEL | **Staging:** $STAGING_LABEL" >> $GITHUB_OUTPUT
          if [ "$PROD" = "failure" ] || [ "$STAGING" = "failure" ]; then
            echo "title=Deploy - Échec" >> $GITHUB_OUTPUT
            echo "color=16711680" >> $GITHUB_OUTPUT
          else
            echo "title=Deploy - Succès" >> $GITHUB_OUTPUT
            echo "color=65280" >> $GITHUB_OUTPUT
          fi
      - name: Notify Discord
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          # content: ""
          title: ${{ steps.msg.outputs.title }}
          description: ${{ steps.msg.outputs.description }}
          # image: ${{ secrets.EMBED_IMAGE }}
          color: ${{ steps.msg.outputs.color }}
          url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          username: GitHub Actions
          # avatar_url: ${{ secrets.AVATAR_URL }}
