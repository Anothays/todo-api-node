name: Post-deploy health check
description: Vérifie les endpoints /health prod et staging après déploiement
inputs:
  prod_result:
    description: Résultat du job deploy-prod (success, failure, skipped)
    required: true
  staging_result:
    description: Résultat du job deploy-staging (success, failure, skipped)
    required: true
  url_prod:
    description: URL de base prod pour /health
    required: true
  url_staging:
    description: URL de base staging pour /health
    required: true
runs:
  using: composite
  steps:
    - name: Check /health (prod)
      if: inputs.prod_result == 'success'
      run: curl -f -s "${{ inputs.url_prod }}/health"
      shell: bash
    - name: Check /health (staging)
      if: inputs.staging_result == 'success'
      run: curl -f -s "${{ inputs.url_staging }}/health"
      shell: bash
