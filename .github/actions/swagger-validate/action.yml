name: Swagger validate
description: Generate OpenAPI spec from config and lint with Spectral
runs:
  using: composite
  steps:
    - name: Generate OpenAPI spec
      run: |
        node --input-type=module -e "const m = await import('./config/swagger.js'); 
        const fs = await import('fs'); 
        fs.writeFileSync('openapi.json', JSON.stringify(m.spec, null, 2));"
      shell: bash
    - name: Spectral lint
      run: npx spectral lint openapi.json --ruleset config/.spectral.js --fail-severity=error
      shell: bash
